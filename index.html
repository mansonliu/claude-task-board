<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 任務看板</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1c2024;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #2f6feb;
    --chip: #eef1f5;
    --shadow: 0 1px 2px rgba(0,0,0,.05), 0 1px 8px rgba(0,0,0,.03);
    --s-progress: #2f6feb;
    --s-blocked:  #d9534f;
    --s-todo:     #b08400;
    --s-done:     #3a9d5d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --card: #181b21;
      --text: #e6e8eb;
      --muted: #9097a1;
      --border: #2a2f38;
      --accent: #5b8def;
      --chip: #242932;
      --shadow: none;
      --s-progress: #5b8def;
      --s-blocked:  #f0726c;
      --s-todo:     #d6a93a;
      --s-done:     #54c07c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px;
    margin-bottom: 6px;
  }
  h1 { font-size: 1.45rem; font-weight: 650; margin: 0; letter-spacing: -.01em; }
  .meta { color: var(--muted); font-size: .82rem; }
  .summary { display: flex; flex-wrap: wrap; gap: 16px; margin: 14px 0 26px; }
  .summary .stat { font-size: .85rem; color: var(--muted); }
  .summary .stat b { color: var(--text); font-size: 1rem; }

  .tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin: 22px 0 24px;
  }
  .tab {
    appearance: none; border: none; background: none; cursor: pointer;
    font: inherit; color: var(--muted);
    padding: 9px 14px; border-radius: 9px 9px 0 0;
    font-size: .92rem; font-weight: 600;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge {
    font-size: .72rem; font-weight: 600; color: var(--muted);
    background: var(--chip); border-radius: 999px; padding: 1px 7px; margin-left: 6px;
  }
  .tab.active .badge { color: var(--accent); }

  .section { margin-bottom: 30px; }
  .section-head {
    display: flex; align-items: center; gap: 9px;
    margin: 0 0 12px; font-size: .8rem; font-weight: 650;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .count { color: var(--muted); font-weight: 500; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 15px;
    box-shadow: var(--shadow);
  }
  .card .title { font-weight: 600; font-size: .98rem; margin-bottom: 7px; }
  .card .note { color: var(--muted); font-size: .85rem; margin-bottom: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip {
    font-size: .72rem; padding: 2px 8px; border-radius: 999px;
    background: var(--chip); color: var(--muted); white-space: nowrap;
  }
  .chip.machine { font-weight: 600; }
  .date { margin-left: auto; font-size: .72rem; color: var(--muted); }

  .empty { color: var(--muted); font-size: .85rem; padding: 6px 2px; }
  footer { margin-top: 40px; color: var(--muted); font-size: .76rem; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Claude 任務看板</h1>
    <span class="meta" id="updated"></span>
  </header>
  <div class="summary" id="summary"></div>
  <div class="tabs" id="tabs"></div>
  <div id="board"></div>
  <footer id="footer"></footer>
</div>

<script>
const STATUSES = [
  { key: "in_progress", label: "進行中", color: "var(--s-progress)" },
  { key: "blocked",     label: "卡住",   color: "var(--s-blocked)"  },
  { key: "todo",        label: "待辦",   color: "var(--s-todo)"     },
  { key: "done",        label: "已完成", color: "var(--s-done)"     },
];
const META = Object.fromEntries(STATUSES.map(s => [s.key, s]));

// 排程(常駐自動任務)以 category 標記,獨立成一個分頁,不混進進行中
const SCHED_CAT = "排程";
const isSched = t => t.category === SCHED_CAT;

// 分頁:首頁=進行中,接著=排程,待辦+卡住,已完成
const TABS = [
  { key: "active",   label: "進行中",     statuses: ["in_progress"] },
  { key: "schedule", label: "排程",       sched: true },
  { key: "queue",    label: "待辦・卡住", statuses: ["blocked", "todo"] },
  { key: "done",     label: "已完成",     statuses: ["done"] },
];
let DATA = { tasks: [] };
let activeTab = (location.hash || "").replace("#", "") || "active";
if (!TABS.some(t => t.key === activeTab)) activeTab = "active";

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// 先 esc() 防 XSS,再把 http(s) 網址轉成可點連結(URL 字元已跳脫,引號無法逸出 href)
function noteHtml(s){
  return esc(s).replace(/https?:\/\/[^\s｜，。、）)】」』]+/g,
    u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}

function card(t){
  const chips = [];
  if (t.machine)  chips.push(`<span class="chip machine">${esc(t.machine)}</span>`);
  if (t.category) chips.push(`<span class="chip">${esc(t.category)}</span>`);
  const date = t.updated ? `<span class="date">${esc(t.updated)}</span>` : "";
  return `<div class="card ${t.status==='done'?'done':''}">
    <div class="title">${esc(t.title)}</div>
    ${t.note ? `<div class="note">${noteHtml(t.note)}</div>` : ""}
    <div class="chips">${chips.join("")}${date}</div>
  </div>`;
}

// 排程任務不計入各狀態的計數(它們有自己的分頁),分頁徽章才不會跟卡片對不上
function count(status){ return DATA.tasks.filter(t => t.status === status && !isSched(t)).length; }
function tabCount(tab){
  if (tab.sched) return DATA.tasks.filter(isSched).length;
  return tab.statuses.reduce((n, s) => n + count(s), 0);
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(tab =>
    `<button class="tab ${tab.key===activeTab?'active':''}" data-tab="${tab.key}">
       ${tab.label}<span class="badge">${tabCount(tab)}</span>
     </button>`
  ).join("");
  document.querySelectorAll(".tab").forEach(btn =>
    btn.addEventListener("click", () => setTab(btn.dataset.tab)));
}

function renderBoard(){
  const tab = TABS.find(t => t.key === activeTab);
  // 排程分頁:單純依 updated 降冪列出所有排程任務
  if (tab.sched) {
    const items = DATA.tasks.filter(isSched)
      .sort((a,b) => (b.updated||"").localeCompare(a.updated||""));
    document.getElementById("board").innerHTML = items.length
      ? `<div class="grid">${items.map(card).join("")}</div>`
      : `<div class="empty">目前沒有排程</div>`;
    return;
  }
  // 單一狀態的分頁不重複標題,直接列卡片;多狀態(待辦・卡住)才分段
  const sections = tab.statuses.map(key => {
    const s = META[key];
    const items = DATA.tasks
      .filter(t => t.status === key && !isSched(t))
      .sort((a,b) => (b.updated||"").localeCompare(a.updated||""));
    if (!items.length && tab.statuses.length === 1)
      return `<div class="empty">目前沒有${s.label}的任務</div>`;
    if (!items.length) return "";
    const grid = `<div class="grid">${items.map(card).join("")}</div>`;
    if (tab.statuses.length === 1) return grid;
    return `<section class="section">
      <div class="section-head">
        <span class="dot" style="background:${s.color}"></span>
        ${s.label} <span class="count">${items.length}</span>
      </div>${grid}
    </section>`;
  }).join("");
  document.getElementById("board").innerHTML =
    sections || `<div class="empty">目前沒有任務</div>`;
}

function setTab(key){
  activeTab = key;
  if (history.replaceState) history.replaceState(null, "", "#" + key);
  renderTabs();
  renderBoard();
}

function render(data){
  DATA = data;
  document.getElementById("updated").textContent = data.updated ? `更新於 ${data.updated}` : "";
  document.getElementById("summary").innerHTML = STATUSES.map(s =>
    `<span class="stat"><b style="color:${s.color}">${count(s.key)}</b> ${s.label}</span>`
  ).join("") +
    `<span class="stat"><b>${DATA.tasks.filter(isSched).length}</b> 排程</span>`;
  renderTabs();
  renderBoard();
}

fetch("tasks.json?_=" + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => {
    document.getElementById("board").innerHTML =
      `<div class="empty">讀取 tasks.json 失敗:${esc(e.message)}</div>`;
  });

window.addEventListener("hashchange", () => {
  const key = location.hash.replace("#", "");
  if (TABS.some(t => t.key === key) && key !== activeTab) {
    activeTab = key;
    renderTabs();
    renderBoard();
  }
});

document.getElementById("footer").innerHTML =
  '資料來源 <a href="tasks.json">tasks.json</a> · 由 Claude Code 在各機器自動更新';
</script>
</body>
</html>
