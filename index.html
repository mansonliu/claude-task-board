<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 任務看板</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1c2024;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #2f6feb;
    --chip: #eef1f5;
    --shadow: 0 1px 2px rgba(0,0,0,.05), 0 1px 8px rgba(0,0,0,.03);
    --s-progress: #2f6feb;
    --s-blocked:  #d9534f;
    --s-todo:     #b08400;
    --s-done:     #3a9d5d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --card: #181b21;
      --text: #e6e8eb;
      --muted: #9097a1;
      --border: #2a2f38;
      --accent: #5b8def;
      --chip: #242932;
      --shadow: none;
      --s-progress: #5b8def;
      --s-blocked:  #f0726c;
      --s-todo:     #d6a93a;
      --s-done:     #54c07c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px;
    margin-bottom: 6px;
  }
  h1 { font-size: 1.45rem; font-weight: 650; margin: 0; letter-spacing: -.01em; }
  .meta { color: var(--muted); font-size: .82rem; }
  .summary { display: flex; flex-wrap: wrap; gap: 16px; margin: 14px 0 26px; }
  .summary .stat { font-size: .85rem; color: var(--muted); }
  .summary .stat b { color: var(--text); font-size: 1rem; }

  .section { margin-bottom: 30px; }
  .section-head {
    display: flex; align-items: center; gap: 9px;
    margin: 0 0 12px; font-size: .8rem; font-weight: 650;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .count { color: var(--muted); font-weight: 500; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 15px;
    box-shadow: var(--shadow);
    border-left: 3px solid var(--bar, var(--border));
  }
  .card.done { opacity: .72; }
  .card .title { font-weight: 600; font-size: .98rem; margin-bottom: 7px; }
  .card.done .title { text-decoration: line-through; text-decoration-color: var(--muted); }
  .card .note { color: var(--muted); font-size: .85rem; margin-bottom: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip {
    font-size: .72rem; padding: 2px 8px; border-radius: 999px;
    background: var(--chip); color: var(--muted); white-space: nowrap;
  }
  .chip.machine { font-weight: 600; }
  .date { margin-left: auto; font-size: .72rem; color: var(--muted); }

  .empty { color: var(--muted); font-size: .85rem; padding: 6px 2px; }
  footer { margin-top: 40px; color: var(--muted); font-size: .76rem; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Claude 任務看板</h1>
    <span class="meta" id="updated"></span>
  </header>
  <div class="summary" id="summary"></div>
  <div id="board"></div>
  <footer id="footer"></footer>
</div>

<script>
const STATUSES = [
  { key: "in_progress", label: "進行中", color: "var(--s-progress)" },
  { key: "blocked",     label: "卡住",   color: "var(--s-blocked)"  },
  { key: "todo",        label: "待辦",   color: "var(--s-todo)"     },
  { key: "done",        label: "已完成", color: "var(--s-done)"     },
];

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function card(t){
  const st = STATUSES.find(s=>s.key===t.status) || STATUSES[0];
  const chips = [];
  if (t.machine)  chips.push(`<span class="chip machine">${esc(t.machine)}</span>`);
  if (t.category) chips.push(`<span class="chip">${esc(t.category)}</span>`);
  const date = t.updated ? `<span class="date">${esc(t.updated)}</span>` : "";
  return `<div class="card ${t.status==='done'?'done':''}" style="--bar:${st.color}">
    <div class="title">${esc(t.title)}</div>
    ${t.note ? `<div class="note">${esc(t.note)}</div>` : ""}
    <div class="chips">${chips.join("")}${date}</div>
  </div>`;
}

function render(data){
  const tasks = data.tasks || [];
  document.getElementById("updated").textContent = data.updated ? `更新於 ${data.updated}` : "";

  // summary
  const counts = {};
  STATUSES.forEach(s => counts[s.key] = tasks.filter(t=>t.status===s.key).length);
  document.getElementById("summary").innerHTML = STATUSES.map(s =>
    `<span class="stat"><b style="color:${s.color}">${counts[s.key]}</b> ${s.label}</span>`
  ).join("");

  // board
  const board = STATUSES.map(s => {
    const items = tasks
      .filter(t => t.status === s.key)
      .sort((a,b) => (b.updated||"").localeCompare(a.updated||""));
    const body = items.length
      ? `<div class="grid">${items.map(card).join("")}</div>`
      : `<div class="empty">—</div>`;
    return `<section class="section">
      <div class="section-head">
        <span class="dot" style="background:${s.color}"></span>
        ${s.label} <span class="count">${items.length}</span>
      </div>${body}
    </section>`;
  }).join("");
  document.getElementById("board").innerHTML = board;
}

fetch("tasks.json?_=" + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => {
    document.getElementById("board").innerHTML =
      `<div class="empty">讀取 tasks.json 失敗:${esc(e.message)}</div>`;
  });

document.getElementById("footer").innerHTML =
  '資料來源 <a href="tasks.json">tasks.json</a> · 由 Claude Code 在各機器自動更新';
</script>
</body>
</html>
