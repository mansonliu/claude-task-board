<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 任務看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1c2024;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #2f6feb;
    --chip: #eef1f5;
    --shadow: 0 1px 2px rgba(0,0,0,.05), 0 1px 8px rgba(0,0,0,.03);
    --s-progress: #2f6feb;
    --s-blocked:  #d9534f;
    --s-todo:     #b08400;
    --s-done:     #3a9d5d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --card: #181b21;
      --text: #e6e8eb;
      --muted: #9097a1;
      --border: #2a2f38;
      --accent: #5b8def;
      --chip: #242932;
      --shadow: none;
      --s-progress: #5b8def;
      --s-blocked:  #f0726c;
      --s-todo:     #d6a93a;
      --s-done:     #54c07c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px;
    margin-bottom: 6px;
  }
  h1 { font-size: 1.45rem; font-weight: 650; margin: 0; letter-spacing: -.01em; }
  .meta { color: var(--muted); font-size: .82rem; }
  .summary { display: flex; flex-wrap: wrap; gap: 16px; margin: 14px 0 26px; }
  .summary .stat { font-size: .85rem; color: var(--muted); }
  .summary .stat b { color: var(--text); font-size: 1rem; }

  .tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin: 22px 0 24px;
  }
  .tab {
    appearance: none; border: none; background: none; cursor: pointer;
    font: inherit; color: var(--muted);
    padding: 9px 14px; border-radius: 9px 9px 0 0;
    font-size: .92rem; font-weight: 600;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge {
    font-size: .72rem; font-weight: 600; color: var(--muted);
    background: var(--chip); border-radius: 999px; padding: 1px 7px; margin-left: 6px;
  }
  .tab.active .badge { color: var(--accent); }

  .section { margin-bottom: 30px; }
  .section-head {
    display: flex; align-items: center; gap: 9px;
    margin: 0 0 12px; font-size: .8rem; font-weight: 650;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .count { color: var(--muted); font-weight: 500; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 15px;
    box-shadow: var(--shadow);
  }
  .card .title { font-weight: 600; font-size: .98rem; margin-bottom: 7px; }
  .card .note { color: var(--muted); font-size: .85rem; margin-bottom: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip {
    font-size: .72rem; padding: 2px 8px; border-radius: 999px;
    background: var(--chip); color: var(--muted); white-space: nowrap;
  }
  .chip.machine { font-weight: 600; }
  .date { margin-left: auto; font-size: .72rem; color: var(--muted); }

  .empty { color: var(--muted); font-size: .85rem; padding: 6px 2px; }
  footer { margin-top: 40px; color: var(--muted); font-size: .76rem; }
  a { color: var(--accent); }

  /* ── 8-bit 街景標題 ── */
  .hero {
    position: relative; width: 100%;
    aspect-ratio: 320 / 36;
    border-radius: 14px; overflow: hidden;
    margin: 2px 0 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    background: #1a1030;
  }
  .scene { position: absolute; inset: 0; }
  .scene svg { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
  .hero-title {
    position: absolute; top: 0; left: 0; margin: 0;
    padding: clamp(8px, 1.8vw, 14px) clamp(12px, 3vw, 22px);
    display: flex; flex-direction: column; gap: 4px;
    font-weight: 400; line-height: 1.1; letter-spacing: normal;
  }
  .ht-en {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(12px, 2.6vw, 22px); color: #cfe2ff;
    text-shadow: 2px 2px 0 #1c3f7a, 3px 3px 0 rgba(0,0,0,.4);
  }
  .ht-sub {
    font-size: clamp(.62rem, 1.5vw, .76rem); color: #aec6ec;
    margin-top: 2px; opacity: .9; letter-spacing: normal;
    text-shadow: 1px 1px 0 rgba(0,0,0,.5);
  }
  .scene .tw { animation: tw 1.6s steps(2, jump-none) infinite; }
  @keyframes tw { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }
  @media (prefers-reduced-motion: reduce) {
    .scene .tw { animation: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div id="scene" class="scene" aria-hidden="true"></div>
    <h1 class="hero-title">
      <span class="ht-en">CLAUDE</span>
      <span class="ht-sub meta" id="updated"></span>
    </h1>
  </header>
  <div class="summary" id="summary"></div>
  <div class="tabs" id="tabs"></div>
  <div id="board"></div>
  <footer id="footer"></footer>
</div>

<script>
const STATUSES = [
  { key: "in_progress", label: "進行中", color: "var(--s-progress)" },
  { key: "blocked",     label: "卡住",   color: "var(--s-blocked)"  },
  { key: "todo",        label: "待辦",   color: "var(--s-todo)"     },
  { key: "done",        label: "已完成", color: "var(--s-done)"     },
];
const META = Object.fromEntries(STATUSES.map(s => [s.key, s]));

// 排程(常駐自動任務)以 category 標記,獨立成一個分頁,不混進進行中
const SCHED_CAT = "排程";
const isSched = t => t.category === SCHED_CAT;

// 分頁:首頁=進行中,接著=排程,待辦+卡住,已完成
const TABS = [
  { key: "active",   label: "進行中",     statuses: ["in_progress"] },
  { key: "schedule", label: "排程",       sched: true },
  { key: "queue",    label: "待辦・卡住", statuses: ["blocked", "todo"] },
  { key: "done",     label: "已完成",     statuses: ["done"] },
];
let DATA = { tasks: [] };
let activeTab = (location.hash || "").replace("#", "") || "active";
if (!TABS.some(t => t.key === activeTab)) activeTab = "active";

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// 先 esc() 防 XSS,再把 http(s) 網址轉成可點連結(URL 字元已跳脫,引號無法逸出 href)
function noteHtml(s){
  return esc(s).replace(/https?:\/\/[^\s｜，。、）)】」』]+/g,
    u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}

function card(t){
  const chips = [];
  if (t.machine)  chips.push(`<span class="chip machine">${esc(t.machine)}</span>`);
  if (t.category) chips.push(`<span class="chip">${esc(t.category)}</span>`);
  const date = t.updated ? `<span class="date">${esc(t.updated)}</span>` : "";
  return `<div class="card ${t.status==='done'?'done':''}">
    <div class="title">${esc(t.title)}</div>
    ${t.note ? `<div class="note">${noteHtml(t.note)}</div>` : ""}
    <div class="chips">${chips.join("")}${date}</div>
  </div>`;
}

// 排程任務不計入各狀態的計數(它們有自己的分頁),分頁徽章才不會跟卡片對不上
function count(status){ return DATA.tasks.filter(t => t.status === status && !isSched(t)).length; }
function tabCount(tab){
  if (tab.sched) return DATA.tasks.filter(isSched).length;
  return tab.statuses.reduce((n, s) => n + count(s), 0);
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(tab =>
    `<button class="tab ${tab.key===activeTab?'active':''}" data-tab="${tab.key}">
       ${tab.label}<span class="badge">${tabCount(tab)}</span>
     </button>`
  ).join("");
  document.querySelectorAll(".tab").forEach(btn =>
    btn.addEventListener("click", () => setTab(btn.dataset.tab)));
}

function renderBoard(){
  const tab = TABS.find(t => t.key === activeTab);
  // 排程分頁:單純依 updated 降冪列出所有排程任務
  if (tab.sched) {
    const items = DATA.tasks.filter(isSched)
      .sort((a,b) => (b.updated||"").localeCompare(a.updated||""));
    document.getElementById("board").innerHTML = items.length
      ? `<div class="grid">${items.map(card).join("")}</div>`
      : `<div class="empty">目前沒有排程</div>`;
    return;
  }
  // 單一狀態的分頁不重複標題,直接列卡片;多狀態(待辦・卡住)才分段
  const sections = tab.statuses.map(key => {
    const s = META[key];
    const items = DATA.tasks
      .filter(t => t.status === key && !isSched(t))
      .sort((a,b) => (b.updated||"").localeCompare(a.updated||""));
    if (!items.length && tab.statuses.length === 1)
      return `<div class="empty">目前沒有${s.label}的任務</div>`;
    if (!items.length) return "";
    const grid = `<div class="grid">${items.map(card).join("")}</div>`;
    if (tab.statuses.length === 1) return grid;
    return `<section class="section">
      <div class="section-head">
        <span class="dot" style="background:${s.color}"></span>
        ${s.label} <span class="count">${items.length}</span>
      </div>${grid}
    </section>`;
  }).join("");
  document.getElementById("board").innerHTML =
    sections || `<div class="empty">目前沒有任務</div>`;
}

function setTab(key){
  activeTab = key;
  if (history.replaceState) history.replaceState(null, "", "#" + key);
  renderTabs();
  renderBoard();
}

function render(data){
  DATA = data;
  document.getElementById("updated").textContent = data.updated ? `更新於 ${data.updated}` : "";
  document.getElementById("summary").innerHTML = STATUSES.map(s =>
    `<span class="stat"><b style="color:${s.color}">${count(s.key)}</b> ${s.label}</span>`
  ).join("") +
    `<span class="stat"><b>${DATA.tasks.filter(isSched).length}</b> 排程</span>`;
  renderTabs();
  renderBoard();
}

// ── 8-bit 街景標題:依台北時間在白天/黃昏/清晨/夜晚間切換 ──
// 台北(UTC+8)當前小時(含分鐘),不受瀏覽器時區影響
function taipeiHour(){
  const parts = new Intl.DateTimeFormat("en-US",
    {timeZone:"Asia/Taipei", hour12:false, hour:"2-digit", minute:"2-digit"})
    .formatToParts(new Date());
  const get = t => +(parts.find(p=>p.type===t)||{value:0}).value;
  let hh = get("hour"); if(hh===24) hh=0;                   // 某些環境午夜回傳 24
  return hh + get("minute")/60;
}
function phaseOf(h){
  if (h >= 7  && h < 17) return "day";
  if (h >= 17 && h < 19) return "dusk";
  if (h >= 5  && h < 7 ) return "dawn";
  return "night";
}
const PALETTES = {
  night: {
    sky:["#081226","#112a4e","#1b3f6e"],
    stars:"full", moon:true, sun:null,
    bld:["#142545","#0e1b34"], litWin:"#ffd45e", darkWin:"#27406b", winTwinkle:true,
    roadTop:"#24365c", road:"#0c1424", line:"#c9b54a",
    title:"#cfe2ff", titleSh:"2px 2px 0 #1c3f7a, 3px 3px 0 rgba(0,0,0,.4)", sub:"#aec6ec",
  },
  dusk: {
    sky:["#1d1745","#5a2c63","#c85a3c"],
    stars:"few", moon:false, sun:{cx:248,cy:25,r:4,fill:"#ffd27a",glow:"#ff7a34"},
    bld:["#2a1f44","#191230"], litWin:"#ffcf5e", darkWin:"#3a2b52", winTwinkle:true,
    roadTop:"#5a3a4a", road:"#1a1320", line:"#d8a84a",
    title:"#ffe7c4", titleSh:"2px 2px 0 #6a2a4a, 3px 3px 0 rgba(0,0,0,.4)", sub:"#ffd0a0",
  },
  dawn: {
    sky:["#152a5e","#6a5a9a","#f0a98a"],
    stars:"few", moon:false, sun:{cx:64,cy:25,r:4,fill:"#ffdca0",glow:"#ffac6a"},
    bld:["#26305a","#172040"], litWin:"#ffd98a", darkWin:"#33406b", winTwinkle:false,
    roadTop:"#4a5070", road:"#141a30", line:"#cdb46a",
    title:"#ffe9d6", titleSh:"2px 2px 0 #3a4a7a, 3px 3px 0 rgba(0,0,0,.4)", sub:"#ffd2bc",
  },
  day: {
    sky:["#5fb0ee","#8fc9f0","#c7e6f7"],
    stars:"none", moon:false, sun:{cx:276,cy:9,r:4,fill:"#fff2a8",glow:"#ffd84e"},
    bld:["#3a5c82","#274764"], litWin:"#d2ebff", darkWin:"#21456b", winTwinkle:false,
    roadTop:"#9aa6bf", road:"#566076", line:"#e8e2b8",
    title:"#0e2c52", titleSh:"1px 1px 0 #d4ecfc, 2px 2px 0 rgba(255,255,255,.5)", sub:"#143b6b",
  },
};
const STAR_POS = [[20,4],[44,9],[72,3],[112,7],[150,5],[196,4],[224,8],[252,3],[298,6],[64,11],[170,10]];

function buildHero(){
  const pal = PALETTES[phaseOf(taipeiHour())];
  const W = 320, H = 36, base = 30;   // base = 路面頂端
  const P = [];
  const r = (x,y,w,h,f,cls)=> P.push(
    `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}"${cls?` class="${cls}"`:""}/>`);

  P.push(`<defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${pal.sky[0]}"/>
      <stop offset="0.6" stop-color="${pal.sky[1]}"/>
      <stop offset="1" stop-color="${pal.sky[2]}"/>
    </linearGradient>
  </defs>`);

  r(0,0,W,H,"url(#sky)");                                   // 天空

  // 星星(夜晚全部+部分閃爍;清晨/黃昏少量;白天無)
  if (pal.stars !== "none"){
    const list = pal.stars === "few" ? STAR_POS.slice(0,4) : STAR_POS;
    list.forEach(([x,y],i)=> r(x,y,1,1, pal.stars==="few" ? "#cdd8f2" : "#dce8ff",
      (pal.stars==="full" && i%3===0) ? "tw" : ""));
  }

  // 月亮(夜晚)
  if (pal.moon){
    P.push(`<circle cx="276" cy="8" r="4" fill="#e6edff"/>`);
    P.push(`<circle cx="274" cy="6" r="1.4" fill="#cdd8f2"/>`);
  }
  // 太陽(白天/黃昏/清晨,含光暈)
  if (pal.sun){
    const s = pal.sun;
    P.push(`<circle cx="${s.cx}" cy="${s.cy}" r="${s.r+2.5}" fill="${s.glow}" opacity="0.45"/>`);
    P.push(`<circle cx="${s.cx}" cy="${s.cy}" r="${s.r}" fill="${s.fill}"/>`);
  }

  // 建築天際線 + 窗戶
  const B = [[0,34,16],[34,26,11],[60,30,19],[90,22,8],[112,36,14],
             [148,24,12],[172,40,17],[212,20,7],[232,34,15],[266,28,11],[294,30,19]];
  B.forEach(([x,w,top],bi)=>{
    r(x,top,w,base-top, bi%2 ? pal.bld[0] : pal.bld[1]);
    for(let cx=x+3; cx<=x+w-4; cx+=7){
      for(let cy=top+3; cy<=base-4; cy+=5){
        const k = (cx*3 + cy*7 + bi) % 5;
        if(k===0) continue;                                  // 留空當建築實體
        const lit = k%3 !== 0;
        r(cx,cy,3,3, lit ? pal.litWin : pal.darkWin,
          (pal.winTwinkle && lit && (cx+cy)%4===0) ? "tw" : "");
      }
    }
  });

  // 路面 + 中線虛線
  r(0,base-1,W,1,pal.roadTop);
  r(0,base,W,H-base,pal.road);
  for(let dx=6; dx<W; dx+=24) r(dx,base+3,10,1,pal.line);

  // 停在路邊的跑車(低扁流線型,靜止)
  const sportscar = (x,body,win)=>{
    r(x,    base-3, 16, 3, body);          // 車身
    r(x+4,  base-5,  7, 2, body);          // 車頂
    r(x+5,  base-4,  5, 1, win);           // 車窗
    r(x+15, base-3,  1, 1, "#ffe9a8");     // 頭燈
    r(x+1,  base,    3, 2, "#10131c");     // 前輪
    r(x+11, base,    3, 2, "#10131c");     // 後輪
  };
  sportscar(46,  "#e0394f", "#bfe7ff");    // 紅
  sportscar(150, "#2bc2b0", "#d7fbff");    // 青
  sportscar(244, "#f2c14e", "#fff3cf");    // 黃

  const el = document.getElementById("scene");
  if(el) el.innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">${P.join("")}</svg>`;

  // 標題文字配色隨時段(白天淺天空底要深色字才讀得清)
  const en = document.querySelector(".ht-en");
  const sub = document.querySelector(".ht-sub");
  if(en){ en.style.color = pal.title; en.style.textShadow = pal.titleSh; }
  if(sub){ sub.style.color = pal.sub; }
  const hero = document.querySelector(".hero");
  if(hero) hero.style.background = pal.sky[1];
}
buildHero();
// 每 5 分鐘重算時段,跨越白天/夜晚交界時自動換景,不必重新整理
setInterval(buildHero, 5*60*1000);

fetch("tasks.json?_=" + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => {
    document.getElementById("board").innerHTML =
      `<div class="empty">讀取 tasks.json 失敗:${esc(e.message)}</div>`;
  });

window.addEventListener("hashchange", () => {
  const key = location.hash.replace("#", "");
  if (TABS.some(t => t.key === key) && key !== activeTab) {
    activeTab = key;
    renderTabs();
    renderBoard();
  }
});

document.getElementById("footer").innerHTML =
  '資料來源 <a href="tasks.json">tasks.json</a> · 由 Claude Code 在各機器自動更新';
</script>
</body>
</html>
